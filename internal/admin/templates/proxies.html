<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proxies — Klaz Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
nav{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;gap:20px;align-items:center}
nav a{color:#8b949e;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:6px;transition:.2s}
nav a:hover,nav a.active{color:#f0f6fc;background:#21262d}
nav .brand{color:#58a6ff;font-weight:700;font-size:16px;margin-right:auto}
.container{max-width:1200px;margin:0 auto;padding:24px}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
th{background:#21262d;text-align:left;padding:12px 16px;font-size:12px;text-transform:uppercase;color:#8b949e;letter-spacing:.5px}
td{padding:10px 16px;border-top:1px solid #21262d;font-size:13px;font-family:monospace}
.alive{color:#3fb950}
.dead{color:#f85149}
.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:16px}
.btn:hover{background:#30363d}
</style>
</head>
<body>
<nav>
<span class="brand">Klaz Parser</span>
<a href="/admin/">Dashboard</a>
<a href="/admin/settings">Settings</a>
<a href="/admin/proxies" class="active">Proxies</a>
<a href="/admin/tasks">Tasks</a>
<a href="/admin/logs">Logs</a>
</nav>
<div class="container">
<h1 style="margin-bottom:20px">Proxy Pool</h1>
<form method="POST" action="/admin/actions/proxy-reload" style="display:inline">
<button class="btn" type="submit">Reload Proxies</button>
</form>
<table>
<thead>
<tr><th>Proxy</th><th>Status</th><th>Latency</th><th>Success Rate</th><th>Requests</th><th>Failures</th></tr>
</thead>
<tbody>
{{range .}}
<tr>
<td>{{.URL}}</td>
<td>{{if .Alive}}<span class="alive">ALIVE</span>{{else}}<span class="dead">DEAD</span>{{end}}</td>
<td>{{.Latency.Milliseconds}}ms</td>
<td>{{printf "%.0f" (mul .SuccessRate 100)}}%</td>
<td>{{.TotalReqs}}</td>
<td>{{.FailedReqs}}</td>
</tr>
{{end}}
</tbody>
</table>
</div>
</body>
</html>
