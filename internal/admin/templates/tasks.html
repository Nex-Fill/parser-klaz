<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks — Klaz Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
nav{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;gap:20px;align-items:center}
nav a{color:#8b949e;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:6px;transition:.2s}
nav a:hover,nav a.active{color:#f0f6fc;background:#21262d}
nav .brand{color:#58a6ff;font-weight:700;font-size:16px;margin-right:auto}
.container{max-width:1200px;margin:0 auto;padding:24px}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
th{background:#21262d;text-align:left;padding:12px 16px;font-size:12px;text-transform:uppercase;color:#8b949e}
td{padding:10px 16px;border-top:1px solid #21262d;font-size:13px}
.status-running{color:#3fb950}
.status-completed{color:#58a6ff}
.status-error{color:#f85149}
.status-paused{color:#d29922}
.status-stopped{color:#8b949e}
.status-pending{color:#8b949e}
</style>
</head>
<body>
<nav>
<span class="brand">Klaz Parser</span>
<a href="/admin/">Dashboard</a>
<a href="/admin/settings">Settings</a>
<a href="/admin/proxies">Proxies</a>
<a href="/admin/tasks" class="active">Tasks</a>
<a href="/admin/logs">Logs</a>
</nav>
<div class="container">
<h1 style="margin-bottom:20px">All Tasks</h1>
<table>
<thead>
<tr><th>ID</th><th>Name</th><th>Status</th><th>User</th><th>Found</th><th>Checked</th><th>Errors</th><th>Created</th></tr>
</thead>
<tbody>
{{range .}}
<tr>
<td style="font-family:monospace;font-size:12px">{{.ID}}</td>
<td>{{.Name}}</td>
<td><span class="status-{{.Status}}">{{.Status}}</span></td>
<td>{{.UserID}}</td>
<td>{{.Progress.AdsFound}}</td>
<td>{{.Progress.AdsChecked}}</td>
<td>{{.Progress.Errors}}</td>
<td>{{.CreatedAt.Format "Jan 02 15:04"}}</td>
</tr>
{{end}}
</tbody>
</table>
</div>
</body>
</html>
